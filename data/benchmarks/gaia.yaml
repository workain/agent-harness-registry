name: GAIA
slug: gaia
homepage: https://arxiv.org/abs/2311.12983
kind: benchmark
domain: web/tool/multi-modal question answering
what_it_is: >
  466 questions (Levels 1-3, by tool/step count) requiring web browsing, multi-modal file
  handling, and code execution to answer. Scoring is quasi-exact-match (normalized
  string/number/list vs one gold answer) — mechanical and cheap.
scoring_mechanism: "quasi-exact-match: normalized string/number/list comparison against a single gold answer"
contamination_handling: "design-level (\"absent by design\" — questions constructed to not appear in pre-training data) plus a held-out answer set (300 of 466 questions ungraded publicly, leaderboard-only); authors explicitly disclose residual memorization risk rather than claiming immunity — a good honesty norm"
data_source: "hand-authored questions requiring real web/tool interaction, per the paper"
license: "[unverified — not independently re-checked for this registry entry]"
evaluated_by: [openhands]
our_adapter: null
reliability_note: "GPT-4 reported as avg-of-3 +/- spread (9.1+/-2.5) but INCONSISTENTLY across submissions — the authors themselves flag a plugin/AutoGPT number as non-reproducible; no pass@k framing"
known_gaming_incidents: null
