homepage: https://arxiv.org/abs/2510.04374
kind: benchmark
domain: real-world economically-valuable professional tasks
what_it_is: >
  OpenAI's benchmark of 1,320 tasks covering the majority of U.S. Bureau of Labor
  Statistics Work Activities for 44 occupations across the top 9 GDP-contributing
  sectors. Tasks are constructed from the actual representative work of industry
  professionals (avg. 14 years' experience) and are built from real deliverables/
  work-products that exist today, NOT synthetic academic-exam-style questions — a
  deliberate design contrast with MMLU-style benchmarks.
