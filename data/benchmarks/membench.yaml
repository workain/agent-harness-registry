name: MemBench
slug: membench
homepage: https://github.com/import-myself/Membench
domain: agent memory (factual + reflective)
what_it_is: >
  ACL 2025 Findings benchmark evaluating LLM-agent memory across "effectiveness,
  efficiency, and capacity." Distinguishes factual memory (raw stored information) from
  reflective memory (higher-level adaptation), across participation (first-person) and
  observation (third-person) interaction scenarios, plus noise-extended dialogues
  (FirstNoise/ThirdNoise, ~1k tokens per noise unit) to test retrieval at scale
  (pre-sampled 0-10k and 100k-token variants).
