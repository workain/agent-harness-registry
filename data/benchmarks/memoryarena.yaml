name: MemoryArena
slug: memoryarena
homepage: https://memoryarena.github.io/
kind: benchmark
domain: agent memory (interdependent multi-session agentic tasks)
what_it_is: >
  A benchmark where agents must acquire memory WHILE interacting with an environment,
  then rely on that memory to guide later actions across explicitly interdependent
  subtasks — four domains: web navigation, preference-constrained planning, progressive
  information search, and sequential formal reasoning. Headline finding: agents that
  near-saturate existing long-context memory benchmarks (e.g. LoCoMo) perform poorly
  here, exposing a real evaluation gap between "recall a fact from a long transcript"
  and "actually USE memory to guide multi-session action."
