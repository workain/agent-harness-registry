name: METR Task Standard / Vivaria
slug: metr-task-standard
homepage: https://github.com/METR/task-standard
kind: eval-framework
what_it_is: >
  An autonomous-task eval methodology + infrastructure (Task Standard spec + Vivaria
  runner) used for frontier-model dangerous-capability and autonomy evaluations.
  Emphasizes elicitation discipline and adversarial review over mechanical gates.
capabilities:
  contamination_gate: "process-based — elicitation guidelines, mandatory adversarial second-team review, sandbagging-detection cross-checks; not a mechanical gate"
  reward_hacking_detection: "discipline-based, not mechanical — elicitation guidelines (no dev-set overfitting), canary strings in public write-ups, sandbagging detection via compute-scaling cross-checks (documented in their GPT-5 evaluation report)"
  reliability_methodology: "explicit score@k (best-of-k, a pass@k variant, not the exact Chen et al. combinatorial formula) plus bootstrap confidence intervals (percentile and hierarchical family→task→attempt), with honest disclosure of where results become unreliable (e.g. \"above 16h\")"
  sandboxing: "isolated \"primary machine\" (container or VM, implementation-agnostic), non-root agent user, default-deny network (opt-in full_internet flag), root-owned /protected scoring directory the agent cannot read/write; METR's own docs flag a known residual hole (exfiltration via executable submission files); production runs use VMs (Vivaria, 20-48 vCPU up to 6xH100) [unverified whether an additional gVisor/Firecracker-style layer sits on top]"
