name: OpenAI simple-evals
slug: openai-simple-evals
homepage: https://github.com/openai/simple-evals
kind: eval-framework
what_it_is: >
  A deliberately narrow, mostly-deprecated set of eval scripts OpenAI built for its own
  number-transparency (as of July 2025, only HealthBench/BrowseComp/SimpleQA remain
  actively used) — explicitly not a full eval framework. Scoring is mixed: regex/exact-match
  (MMLU, GPQA) and LLM-as-judge (MATH via a gpt-4-turbo equality-checker; SimpleQA/
  BrowseComp/HealthBench via rubric grading).
capabilities:
  contamination_gate: "confirmed absent — grepped the README and all code, zero mentions of decontamination/leakage/held-out data"
  reward_hacking_detection: "confirmed absent"
  reliability_methodology: "partial — --n-repeats (MATH/GPQA, default 10) duplicates the WHOLE dataset and reports mean/std/bootstrap_std over aggregate accuracy, not per-item pass@k; MMLU/HumanEval/DROP/MGSM are single-run only"
  sandboxing: "n/a"
