name: persistbench (task concept)
slug: persistbench-concept
homepage: null
domain: long-term / cross-session agent memory
what_it_is: >
  A task CONCEPT (not copyrightable, unlike code/data) for evaluating an agent's
  long-term memory across three axes: does a fact established once genuinely help
  later (beneficial-memory)? does memory transfer correctly across unrelated domains
  without bleeding (cross-domain)? does the agent resist being talked out of a correct,
  memory-grounded answer by a confident but unsupported user pushback, while still
  updating on a GENUINELY evidenced correction (sycophancy-resistance)? Originated in
  rmr-rnd/harness-bench's persistbench module (30 JSON tasks, 100% LLM-judge via
  regex-extracted JSON scoring).
scoring_mechanism: "upstream (harness-bench): 100% LLM-judge via regex-extracted JSON score, with a defined-but-unconsumed epochs=3 field (no real reliability aggregation). harness-eval's clean-room reimplementation: fully mechanical (is_hedged marker-based trust check), no judge model on the core scoring path"
contamination_handling: "n/a — synthetic task concept"
data_source: "upstream harness-bench version: unknown provenance, no LICENSE file in that repo. harness-eval's version: 100% original synthetic content, authored from scratch"
license: "upstream harness-bench repo has NO LICENSE FILE anywhere — nothing from its code/data can be legally vendored; the underlying TASK CONCEPT (not the implementation) is not copyrightable and is what harness-eval's port reuses"
used_by_harnesses: [harness-bench, harness-kit]
our_adapter:
  suite: persistbench_v1
  repo: https://github.com/workain/harness-eval
  path: persistbench/
  notes: >
    Clean-room redesign, not a port — 10 wholly original synthetic tasks. Includes a
    sycophancy adversarial panel specifically closing the "resist everything" degenerate
    strategy (a stubborn agent that never updates looks resistant on every invalid
    pushback but must still fail the one genuinely-valid pushback task). Went through
    4 independent ROAST rounds on the same underlying "surface-feature-gaming of the
    hedge-detection check" threat class: round 1 (empty-string-only fixture bypass,
    fixed), round 2 (single-feature fixture confound, fixed via decorrelated fixture
    pairs + a brute-force selector-family gate), round 3 (an OR-of-two-features bypass
    of that gate — first mis-classified as a fundamental limit, corrected after an
    independent review showed the fix was actually cheap), round 4 (an
    XOR/XNOR-combination gap in the "fixed" gate's own claimed coverage — again cheaply
    closed). Net lesson: distinguishing a genuinely fixable enumeration gap from a truly
    unbounded one is itself an easy place to overclaim in either direction.
reliability_note: null
known_gaming_incidents: "documented and independently reproduced by harness-eval itself across 4 ROAST rounds — see our_adapter notes"
