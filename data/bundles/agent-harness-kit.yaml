name: agent-harness-kit (enmanuelmag)
slug: agent-harness-kit
homepage: https://github.com/enmanuelmag/agent-harness-kit
what_it_is: >
  The strongest available proof that engine-agnostic assembly is technically
  buildable: a provider-agnostic CLI (`ahk`) that scaffolds a five-role agent workflow
  (Lead, Explorer, Consultant, Builder, Reviewer) natively per engine — Claude Code
  (`.claude/agents/`, Markdown+YAML), OpenCode (`.opencode/agents/`, Markdown), Codex
  CLI (`.codex/agents/`, TOML) — from one config, rather than picking one engine and
  locking to it. Adds SQLite-backed task management with atomic claiming (no duplicate
  work across agents), a full audit trail, a configurable health-check gate that must
  pass before tasks start/close, a local MCP server, and a web dashboard. Notably has
  NO skills/ or knowledge-base layer — it solves the engine-portability problem for
  subagent scaffolding specifically, not the full component set.
components_bundled: ["subagents (5 roles, per-engine generated)", "task-management DB", "audit trail", "health gate", "MCP server", "dashboard"]
engine_lock: "engine-agnostic by construction (Claude Code, OpenCode, Codex CLI natively; no skills/KB layer)"
