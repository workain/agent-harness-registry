name: ai-coding-project-boilerplate (shinpr)
slug: ai-coding-project-boilerplate
homepage: https://github.com/shinpr/ai-coding-project-boilerplate
what_it_is: >
  The richest single-vertical assembled bundle found in this sweep: a TypeScript
  boilerplate for Claude Code with 20+ specialized subagents covering the full dev
  lifecycle (requirement analysis, UI spec, design, planning, implementation, QA, code
  review, debugging, reverse engineering), 10 core skills (coding standards, testing/
  documentation criteria, technical specs, frontend patterns, integration/E2E testing,
  project-context customization), a structured knowledge base (quick-start guides, use
  cases, skills-editing guide, design philosophy), and scale-aware orchestration
  (direct implementation for small tasks; design-then-build for medium; PRD -> design
  -> implementation for large projects). Actively maintained (unlike the other two
  real bundles found), not a one-shot artifact.
components_bundled: ["subagents (20+)", "skills (10)", "knowledge base", "orchestration/workflow logic"]
