name: Claude Code Plugins (mechanism)
slug: claude-code-plugins
homepage: https://code.claude.com/docs/en/plugins-reference
what_it_is: >
  Not a specific bundle but the closest thing to a standardized BUNDLING MECHANISM in
  this whole registry: a plugin is "a self-contained directory of components that
  extends Claude Code," with six component types — skills, agents (subagents), hooks,
  MCP servers, LSP servers, and monitors — installable as one unit via a
  `.claude-plugin/marketplace.json` manifest. Anthropic's own framing justifies this
  explicitly on assembly-friction grounds: a workflow needing three slash commands,
  two subagents, and one MCP server ships as a single install rather than five manual
  steps. This is the schema every concrete bundle in this registry that touches Claude
  Code (agent-teams, and implicitly gtm-starter-kit/ai-coding-project-boilerplate as
  Claude-Code-native artifacts) is built on or could be packaged into. Notably: no
  first-class "memory/KB" component type exists in the six-type schema — memory ships
  as an ordinary skill if at all, not a structural layer.
components_bundled: ["skills", "subagents (agents)", "hooks", "MCP servers", "LSP servers", "monitors"]
engine_lock: "Claude-Code-native — the schema itself, not just individual plugins built on it, does not port to other engines"
license: "Documents a Claude Code feature (proprietary product, see engines/claude-code) — plugin authors' own content is unlicensed by Anthropic"
