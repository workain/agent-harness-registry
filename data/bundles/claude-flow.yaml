what_it_is: >
  A self-described "agent meta-harness": 17+ specialized modes (Architect, Coder, TDD,
  Security, DevOps, etc.), the SPARC methodology (Specification -> Pseudocode ->
  Architecture -> Refinement -> Completion), a Boomerang iterative-refinement pattern, a
  live dashboard, swarm/Queen/topology/consensus coordination primitives, 100+
  specialized agents, and native Claude Code/Codex/Hermes integration — bundling
  orchestration + agents + an MCP server + hooks + memory into one meta-harness. The
  second-highest star count of any bundle-shaped entry in this registry. Originally
  `ruvnet/claude-flow`; the repo has since been renamed to `ruvnet/ruflo` (same project).
