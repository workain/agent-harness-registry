what_it_is: >
  A PAID commercial product whose core "AI Framework" layer is exactly this
  registry's equipment shape: AGENTS.md + 14 scoped rules (auto-load based on which
  files are being edited) + 22 structured skills (enforce quality gates across the
  SDLC), sold standalone at $149 one-time, or bundled with a full Next.js/Postgres/
  Stripe SaaS boilerplate at $399. Explicitly portable across five engines (Claude
  Code, Cursor, Windsurf, Gemini CLI, GitHub Copilot) by building on the open AGENTS.md
  convention rather than one vendor's proprietary manifest format. The single most
  direct evidence in this whole registry that people will PAY for assembled harness
  equipment specifically, not just for adjacent app-scaffolding.
