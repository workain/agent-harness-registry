name: agent-teams plugin (wshobson/agents)
slug: wshobson-agent-teams
homepage: https://github.com/wshobson/agents/tree/main/plugins/agent-teams
what_it_is: >
  A concrete, verified example of the Claude Code Plugin mechanism actually being used
  to assemble a real multi-component bundle: 4 subagents (team-lead, team-implementer,
  team-reviewer, team-debugger) + 6 skills (task-coordination-strategies,
  parallel-feature-development, parallel-debugging, multi-reviewer-patterns,
  team-communication-protocols, team-composition-patterns — a small reference-doc KB
  in effect) + 7 commands, all under one manifest, generated for both Claude Code AND
  Codex (`.claude-plugin/` and `.codex-plugin/` both present) — a genuine cross-engine
  team-in-a-box for ONE task (parallel multi-agent orchestration). It is one plugin
  among 87 mostly single-purpose ones in its parent marketplace (`wshobson/agents`,
  see the separate `wshobson-agents` component entry) — the ecosystem's modal unit is
  still narrow/atomic, not assembled; this plugin is the exception, not the norm.
components_bundled: ["subagents (4)", "skills (6, functioning as a reference KB)", "commands (7)"]
engine_lock: "Claude Code + Codex (both plugin manifests present); not verified for the other 4 engines wshobson/agents otherwise targets"
