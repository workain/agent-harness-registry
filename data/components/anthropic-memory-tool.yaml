harness_eval_verdict:
  reviewed: "2026-07-05"
  tier: "B"
  testability: "tested-live"
  one_liner: >
    A clean, well-specified six-command file-memory contract with a genuinely distinctive
    multi-session-recovery pattern and the cheapest live-testable setup in this registry's
    memory category (zero external deps) — undermined only by the model's own
    discretionary judgment about what's "worth" remembering, which caused real, silently
    inconsistent recall failures in a live head-to-head.
  what_to_steal: >
    The multi-session software-development recovery pattern (an initializer session
    deliberately seeds a progress log + feature checklist + init-script reference BEFORE
    substantive work begins; every later session reads that first; "mark a feature
    complete only after end-to-end verification, not when the code is written") is a
    genuinely reusable discipline, independent of which storage backend implements it —
    more structured than this registry's own file-wiki baseline discipline.
  the_catch: >
    Live-tested (harness-eval #40, key-free: zero external deps — no embeddings, no
    vector store, no LLM shim, just the operator's Claude Code subscription driving the
    documented six-command contract through a real MCP tool-use loop). niah_v1: perfect
    (1.0, 9/9) — the best niah result of any live-tested memory component in this
    registry so far; the `view`/`view_range` file interface is a strong fit for exact-
    token retrieval. persistbench_v1: raw 0.8333, manually audited down to 0.6667 after
    correcting a scoring artifact (the candidate gets fooled by 2 of 2 invalid-pushback
    tasks but is scored "correct" because it also mentions the old value parenthetically)
    — the SAME artifact, on the SAME two task IDs, already found for a completely
    different candidate (LangMem) in this registry's prior live round, strong evidence
    it's a bench-scoring-convention gap, not component-specific. Still beats the
    `recency_naive` honest baseline (0.5833) after correction, and cleanly discriminates
    hedged/unconfirmed pushback from confident evidenced pushback on 4/4 such cases.
    bfcl_memory_v1: 0.25, hacked_rate=0.5 — but 5 of 6 "hacked" flags are concise,
    core-fact-correct answers tripped by this suite's deliberately strict anti-shotgun-
    stuffing gate reacting to a narrative answer style ("Based on what you told me: ...
    as a gateway to..."), not indiscriminate context-dumping (only 1/6 is a genuine
    long/imprecise failure). The real, most novel finding: **"ephemeral-discretion"
    information loss** — the model's OWN documented-and-encouraged judgment about what's
    worth persisting ("keep memory organized... don't create files unless necessary")
    caused it to explicitly refuse to record a "one-day ephemeral" fact the task needed
    (persistbench s5), refuse an ENTIRE customer-service conversation as "not a CRM, this
    memory is scoped to coding-assistant work" (bfcl memory_0 — an unprompted domain-scope
    assumption nothing in this run's own prompting introduced), and silently summarize
    away a specific needed fact into a thematic bucket (bfcl memory_42) — reproducing
    across 4/24 tasks tested (17%), with confirmed run-to-run INCONSISTENCY: the same
    conversation, re-ingested independently for two separate tasks, preserved one fact
    once and summarized it away once. This is a genuine, reproducible cost of a design
    Anthropic explicitly documents and encourages, not a bug in this run's wiring.
    Separately (source-level pre-screen, corrected across 2 rounds): the 84%
    token-reduction figure belongs to context editing, not this tool (~10pt marginal
    figure for the memory tool itself, same source); Anthropic's own SDK helper classes
    had 3 real, now-patched sandbox-escape CVEs (>=0.87.0 fixes all three) — the exact
    vulnerability class its own docs warn *integrators* about, found in Anthropic's own
    reference code for one release window.
  raw_evidence: https://github.com/workain/harness-eval/blob/main/reports/anthropic_memory_tool_live.md
