known_caveats: >
  See harness-eval issue #40's pre-screen (docs/raw/anthropic-memory-tool-2026-07-05/ in
  harness-eval): Anthropic's own SDK helper classes (`BetaLocalFilesystemMemoryTool`) had
  three real, now-patched CVEs — CVE-2026-34450 (world-readable/writable 0o666 memory
  files), CVE-2026-34452 (async variant: a TOCTOU + symlink-following sandbox escape, the
  EXACT vulnerability class the docs warn integrators about, found in Anthropic's own
  reference code), CVE-2026-34451 (TypeScript SDK sibling) — all fixed in SDK >=0.87.0;
  pin that floor explicitly if using the SDK helpers. Separately, Anthropic's own
  Go/PHP/Ruby reference handler examples on the docs page ship WITHOUT path-traversal
  protection by the docs' own admission. The security burden is 4 separate
  integrator-owned risks (path traversal, sensitive-data leakage — mitigated only by the
  model "usually" refusing, unbounded growth, no built-in expiry), not just the one the
  docs emphasize. No disclosed deprecation policy for the versioned tool type
  (`memory_20250818`).
