name: AutoGen Agent Roles (Microsoft)
slug: autogen
category: subagents
homepage: https://github.com/microsoft/autogen
layer: "Capability / subagents layer (equivalent to Block B) — one piece of a larger multi-agent orchestration framework"
what_it_is: >
  The agent-role/composition layer of AutoGen (a full multi-agent AI framework — the framework
  itself is broader than equipment, spanning its own control loop/orchestration runtime, which is
  engine territory per this registry's harness=equipment-vs-engine split; this entry scopes to its
  role-definition piece specifically, the same narrowing this registry applies to `crewai-memory`
  and `llamaindex-memory` for their own parent frameworks). The `ConversableAgent` class is the
  base abstraction other agent roles (e.g. `AssistantAgent`) build on — agents converse with each
  other by exchanging messages to jointly finish a task, a peer-to-peer role-composition model
  distinct from this registry's hub-and-spoke subagent entries (Claude Code Subagents'
  delegate-and-return model, wshobson/agents' fixed role catalog). AutoGen-the-framework also ships
  its own orchestration runtime and `AutoGen Studio` (a no-code workflow builder) — neither is
  catalogued here or elsewhere in this registry as an engine; AutoGen itself is NOT in this
  registry's `engines/` category, so treat this entry as documenting a role-composition PATTERN
  worth knowing about, not a recommendation to adopt the whole framework as equipment.
integration: "Python framework (`pip install autogen-agentchat` etc., per the layered API split); compose agent roles programmatically, not via a plain-file convention like this registry's instructions-rules entries"
license: "Mixed: MIT for code, CC-BY-4.0 for documentation/content (per the fetched repo page) — a different split pattern than this registry's other mixed-license entries (which split old-vs-new code, not code-vs-docs)"
open_source: true
activity:
  stars: "59.5k (per GitHub page fetch, 2026-07-05, for the whole AutoGen repo — the role-composition classes are one part of it, not separately versioned)"
  last_verified_note: "fetched live 2026-07-05; 98 releases, 9k forks, 4.2k dependent projects — BUT the project is explicitly in maintenance mode: 'will not receive new features or enhancements and is community managed going forward,' with Microsoft directing new users to the separate Microsoft Agent Framework (an AutoGen+Semantic-Kernel merger) instead. Cataloged here for its historical/current install base and its distinct peer-to-peer role model, not as an actively-evolving recommendation."
provenance:
  - url: https://github.com/microsoft/autogen
    fetched: "2026-07-05"
    note: "fetched directly (repo page): architecture, license split, maintenance-mode status and migration guidance, activity signal"
