unverified:
  - "Presence-vs-outcome distinction: the one controlled presence-vs-absence RCT found (arXiv:2602.11988) shows NO significant task-success benefit from having an instructions file at all in its main setting — the one verified exception is a +2.7% average gain in repositories with NO other documentation, where a generated file substitutes for missing docs rather than duplicating existing ones. Do not read 'ship this template' as outcome-proven in general; read it as evidence-consistent with the one condition where presence measurably helps."
  - "The Tasks/log.md running-log recommendation rests on adjacent evidence only (Reflexion/ReasoningBank/SWE-MeM-style same-task/same-episode memory ablations), not a direct study of human-authored, multi-day project journals — stated explicitly as a scope gap in the deep-dive, not glossed over."
  - "Live-dogfooded: the with-git commit gate (blocking a fresh session's real first commit on unborn HEAD) and the without-git backup-guidance ordering bug. NOT tested: multi-contributor review, long-horizon/multi-week drift, other agent engines (Cursor/Copilot/Gemini CLI), or without-git behavior over time — named explicitly as scope limits of a single-session dogfood, not defects."
