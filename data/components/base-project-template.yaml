name: base-project-template
slug: base-project-template
homepage: https://github.com/workain/agent-harness-registry/tree/main/templates/base-project-template
category: instructions-rules
layer: "Instruction/identity layer (Block A) plus project-local seeds of memory, operational-storage, and gate blocks — a small project-bootstrap SCAFFOLD (several files + two variants), not a single convention file"
what_it_is: >
  An evidence-derived default CLAUDE.md/AGENTS.md-class project template, shipped as two
  copy-ready variants (`with-git/`, `without-git/`) built from a shared `common/` + `fragments/`
  source composed by a `render_templates.py --check` drift gate. Ships a short identity/instructions
  file (safety boundaries near the top if any apply, build/test/verify commands, non-default
  conventions, repository etiquette, pointers only to memory/knowledge/tasks/skills/subagents —
  no inline restatement of any of those), a `Tasks/<date>_<slug>/` operational-tracking discipline
  (`log.md` mandatory, a review artifact required by policy), a `LESSONS.md`/`DECISIONS.md` pair
  for the deliberately-promoted subset of memory (pointing to the runtime's own auto-memory
  feature for the fast/continuous layer), and empty-by-default `.claude/{skills,agents,
  environment}/` slots. The `with-git/` variant additionally ships a git-tracked (not
  manually-installed) `.claude/settings.json` PreToolUse hook blocking direct commits to
  main/master, plus a PR template requiring a linked review artifact and a merged-reference
  close; `without-git/` ships no such gate (a gate that can't reason about branches without a
  repo would give false confidence by existing at all) and states the honest substitute instead
  (back up before risky changes, lean on the review-artifact policy). Every content decision
  traces to one of two research passes — see the deep-dive for the evidence and its honest
  limits, not restated here.
integration: >
  Copy the ONE variant directory that fits your project (with-git/ if it is or will be a git
  repo, without-git/ otherwise) into your project's root, fill in every <BRACKETED>
  placeholder, delete what doesn't apply. If you edit anything in the source `common/` or
  `fragments/` directories (e.g. to adapt the template for reuse), re-run
  `python3 render_templates.py` and commit the result; `--check` mode verifies the two shipped
  variants haven't drifted from their source.
license: >
  MIT. Resolved 2026-07-24 (operator decision: "не против раздавать и не вижу смысла
  ограничивать" — not opposed to giving it away, sees no reason to restrict it, accepting the
  manager's MIT recommendation). A `LICENSE` file ships at
  `templates/base-project-template/LICENSE`, scoped to the template's own files.
license_tag: "MIT"
open_source: true
use_cases: "default CLAUDE.md/AGENTS.md project bootstrap, new-repo instruction-file scaffolding, mechanical commit-gate + task-tracking discipline for a from-scratch project"
