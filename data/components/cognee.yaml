harness_eval_verdict:
  reviewed: "2026-07-05"
  tier: "B-minus"
  testability: "tested-live"
  one_liner: >
    A real knowledge-graph+vector memory engine that live-tested BETTER than a flat-file
    baseline — the opposite of this cycle's graphiti-zep finding — but ships a verified,
    currently-exploitable unauthenticated privilege-escalation bug (self-registration to
    global LLM-config takeover), and its own answer-generation step is non-deterministic
    enough that no single accuracy number should be taken as exact.
  what_to_steal: >
    The ECL (extract-cognify-load) shape — remember/recall/forget/improve as a second,
    more ergonomic API layered on top of a lower-level add/cognify/search/prune pipeline,
    so simple callers get simple verbs without losing the pipeline's composability. The
    fully-embedded default stack (SQLite + LanceDB + KuzuDB) is genuinely zero external
    services for the single-user case. Local-model support is real, not vaporware:
    fastembed for embeddings and an OpenAI-compatible custom-provider slot for the LLM
    step both work today, key-free — this eval used both to run it.
  the_catch: >
    topoteretes/cognee#3084 (verified, currently exploitable in the actual installed
    1.2.2 package): unrestricted self-registration escalates to global LLM-config
    takeover. Any self-registered user (registration is open, unverified, by default) can
    call POST /api/v1/settings — gated only on Depends(get_authenticated_user), no
    admin/superuser check — to overwrite the global, process-wide LLM endpoint/API key,
    silently routing every subsequent user's prompts, documents, and extracted entities
    to an attacker-controlled server. GET /settings also leaks the first 10 characters of
    the LLM/vector-db API key. GitHub-side fix commits closing this (superuser check +
    full key masking) merged 2026-06-20/21, but a direct re-check against the actual `pip
    install cognee==1.2.2` package (released 2026-06-26, after those commits) found the
    fix NOT present: get_settings_router.py still gates both endpoints on plain
    authentication, get_settings.py still returns the 10-character key prefix verbatim —
    the fix exists on GitHub main but never shipped in the PyPI release most users
    actually install. The SDK-only path this eval tested (no REST server running)
    sidesteps this entirely, but anyone running cognee's REST API/Docker
    image — this entry's own documented integration surface — is exposed today, not
    hypothetically. (An earlier pass of this eval cited CVE-2026-31231, a notebook-exec
    RCE, as the headline security catch; that CVE is real per the official NVD API but
    scoped to "thru v0.4.0," and the vulnerable code path does not exist in 1.2.2 — no
    notebook cell-execution router, no unsafe exec() anywhere in the API code, checked
    directly. Retracted as a current finding per independent ROAST on harness-eval#42.)
    Separately: real run-to-run variance, measured not just caveated — across 3
    independent full-suite persistbench passes on byte-identical content (same
    cache-reused graph, fresh LLM search/completion call each time), cognee scored
    11/12, 12/12, then 10/12 — an ~17-point swing from the search-time completion step
    alone. The suite's G1_determinism gate (byte-identical repeat scores) fails for
    cognee by construction, as it would for any live-LLM-backed memory system — disclosed
    as a property of real-LLM-backed SUTs generally, not cognee-specific, but it means no
    single accuracy number here should be quoted as exact. Custom/local LLM-provider
    wiring has real, open rough edges (hanging on non-standard key formats, provider
    misdetection per cognee#2119). Cognee's own comparative benchmarks (vs
    mem0/Graphiti/LightRAG) are self-published with an acknowledged tuning asymmetry —
    treat as marketing, not evidence. bfcl_memory_v1 and niah_v1 were not run live this
    pass (rig proven and directly reusable; deferred for wall-clock cost under
    shared-host contention, not a technical blocker) — disclosed scope gap, not a
    silent omission.
  live_numbers: >
    persistbench_v1, against LLM-backed apples-to-apples baselines sharing the same
    underlying shim/model as cognee_agent itself: cognee_agent (real cognee) 0.833-1.0
    (3-sample range: 10, 11, 12 of 12) vs. file_wiki_llm (honest baseline: raw session
    text pasted into context, no retrieval smarts) 0.667 vs. bare_model_llm (zero-memory
    floor) 0.167. Cognee beat every baseline (mechanical and LLM-backed) on every sampled
    pass, showed zero contamination, and resisted a hedged-rumor distractor perturbation
    every time it was tested.
  raw_evidence: https://github.com/workain/harness-eval/tree/main/reports/cognee_live_run.md
