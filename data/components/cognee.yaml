name: Cognee
slug: cognee
homepage: https://github.com/topoteretes/cognee
category: memory
layer: "Memory / data layer (equivalent to Block F) — knowledge-graph + vector, dual-layer shape"
what_it_is: >
  An open-source AI memory platform: ingests data in any format and continuously builds
  a self-hosted knowledge graph combining vector embeddings, graph-based reasoning, and
  "cognitive-science-grounded ontology generation" so content is both semantically
  searchable and relationally connected. Exposes remember / recall / forget / improve
  as its core operations — a similar shape to our own agent-memory's remember/forget
  pump, but knowledge-graph-first rather than tiered-access-band-first. LIVE-TESTED
  (harness-eval #37): the only memory component in this registry's series so far to
  BEAT a flat-file baseline on a live head-to-head (0.833-1.0 vs. file-wiki's 0.667) —
  but ships a verified, currently-exploitable unauthenticated privilege-escalation bug
  in its REST API (self-registration to global LLM-config takeover), and its own
  answer-generation step is non-deterministic enough that no single accuracy number
  should be read as exact.
integration: "Python SDK, REST API (localhost:8000 default), CLI (cognee-cli), Docker images, a TypeScript client (@cognee/cognee-ts), a Rust library (cognee-rs), and a Claude Code plugin integration"
license: Apache-2.0
license_tag: "Apache-2.0"
open_source: true
use_cases: "knowledge-graph memory, ontology-linked retrieval, long-term agent memory"
