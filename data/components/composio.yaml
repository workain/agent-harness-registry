name: Composio
slug: composio
homepage: https://github.com/ComposioHQ/composio
category: skills-tools
layer: "Capability / tools layer + access placement (equivalent to Block B) — a tool-integration platform, not a single tool"
what_it_is: >
  A tool-integration platform for AI agents: 1000+ pre-built "toolkits" (Slack, GitHub,
  Notion, Google Workspace, Microsoft 365, X/Twitter, Figma, web search, browser
  automation, etc.), tool search, authentication management, context management, and a
  sandboxed execution workbench — turning "intent into action" without hand-writing
  per-service integration code. Provides framework-specific provider packages so the
  same toolkits plug into OpenAI, Anthropic, LangChain, LangGraph, LlamaIndex, CrewAI,
  AutoGen, Google ADK, and others directly.
integration: "`pip install composio` (Python) or `npm install @composio/core` (TypeScript); framework-specific provider packages for direct integration with the major agent frameworks"
license: MIT
