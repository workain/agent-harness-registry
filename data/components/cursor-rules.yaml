name: Cursor Rules (.cursor/rules, formerly .cursorrules)
slug: cursor-rules
homepage: https://cursor.com/docs/context/rules
category: instructions-rules
layer: "Instruction / identity layer (equivalent to Block A) — a product FEATURE/convention, not standalone open-source software"
what_it_is: >
  Cursor's persistent-instruction system: "system-level instructions to Agent" that
  bundle prompts, scripts, and workflows, shareable across a team. The modern format is
  `.mdc` files under `.cursor/rules/` (frontmatter metadata + content), superseding the
  legacy single `.cursorrules` file (still read, no longer recommended). Four
  application modes: Always Apply (every session), Apply Intelligently (agent judges
  relevance from the rule's own description), Apply to Specific Files (glob-scoped, e.g.
  `src/**/*.tsx`), and Apply Manually (@-mentioned). Also directly supports nested
  `AGENTS.md` files as a simpler no-metadata alternative — i.e. Cursor's own rules
  system and the cross-vendor AGENTS.md convention (see that entry) are interoperable,
  not competing, in Cursor specifically. Team Rules (org-wide, dashboard-managed) are a
  paid-plan feature.
integration: "Author `.mdc` files under a project's `.cursor/rules/` directory (or drop an AGENTS.md); User Rules are configured globally per developer; Team Rules via a paid-plan dashboard"
license: "Cursor itself (the IDE/engine this feature ships inside) is proprietary; the RULES FILES a team authors are the team's own content, with no special license imposed by Cursor — this entry catalogs the CONVENTION/mechanism, not a redistributable piece of software"
