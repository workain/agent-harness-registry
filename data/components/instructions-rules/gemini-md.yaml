name: GEMINI.md (Gemini CLI)
slug: gemini-md
category: instructions-rules
homepage: https://github.com/google-gemini/gemini-cli/blob/main/docs/cli/gemini-md.md
layer: "Instruction / identity layer (equivalent to Block A) — a file-based convention shipped by an open-source engine"
what_it_is: >
  Google's Gemini CLI instruction-file convention: a `GEMINI.md` file provides persistent
  project context (instructions, persona, coding-style guides) sent with every prompt. Distinctive
  relative to this registry's other instruction-file entries for its explicit HIERARCHICAL
  loading model: global context (`~/.gemini/GEMINI.md`, applies to all projects), project/ancestor
  context (searched from the current directory up to the project root), and sub-directory context
  (component-specific instructions) are all loaded and concatenated together, with more-specific
  files overriding general ones. Also supports composing multiple files via `@file.md` imports
  rather than requiring one monolithic file. The filename itself is configurable
  (`context.fileName` in `settings.json`) — so a team could point Gemini CLI at an existing
  AGENTS.md instead, though GEMINI.md is the default.
integration: "`/init` generates a starting GEMINI.md; place files at `~/.gemini/GEMINI.md` (global), project root and ancestors, or subdirectories (component-scoped) — all are loaded and merged automatically"
