name: .goosehints (Goose)
slug: goosehints
category: instructions-rules
homepage: https://github.com/block/goose
layer: "Instruction / identity layer (equivalent to Block A) — a file-based convention shipped by an open-source engine"
what_it_is: >
  Goose's project-instruction file: a `.goosehints` file lets a team document coding
  conventions, architectural patterns, testing practices, and other project-specific nuances —
  positioned explicitly (per its own docs) as "a README for AI." Same functional slot as
  AGENTS.md/CLAUDE.md/GEMINI.md/Cursor Rules/Windsurf Rules in this registry's
  instructions-rules category — six vendors/projects having independently converged on
  "a committed instruction file the agent reads at session start" is itself a notable pattern
  this registry's breadth surfaces. Goose itself (the engine this file belongs to) recently
  moved from Block's own `block/goose` org to the Agentic AI Foundation (AAIF) under the Linux
  Foundation — a real, citable instance of an agent engine being donated to neutral foundation
  governance, not just an internal reorg.
integration: "Drop a `.goosehints` file at a project's root; Goose's built-in developer extension reads it automatically"
license: Apache-2.0
license_tag: "Apache-2.0"
open_source: true
use_cases: "project conventions for Goose, README-for-AI pattern"
