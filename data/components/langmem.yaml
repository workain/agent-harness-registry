name: LangMem (LangChain / LangGraph memory)
slug: langmem
homepage: https://github.com/langchain-ai/langmem
category: memory
layer: "Memory / data layer (equivalent to Block F)"
what_it_is: >
  LangChain's memory package: extracts important information from conversations,
  optimizes agent behavior through prompt refinement, and maintains long-term memory.
  Ships both functional primitives usable with any storage backend AND native
  integration with LangGraph's own long-term memory Store. Includes in-conversation
  memory-management tools an agent can call directly, plus a background memory manager
  that automatically extracts/consolidates/updates knowledge without the agent's
  explicit involvement.
integration: >
  Python package (`langgraph-ai/langmem`); `create_manage_memory_tool`/`create_search_memory_tool`
  for agent-callable memory ops; native LangGraph Store integration for long-term persistence.
  CORRECTION (harness-eval issue #38 pre-screen, 2026-07-05): "usable with any storage backend"
  is true only for the Store choice — `pip install langmem` hard-pins `langgraph>=0.6.0,<2` PLUS
  both `langchain-openai` and `langchain-anthropic` unconditionally regardless of which LLM
  provider you actually use (open issue #142, unaddressed 4.5+ months). You cannot install or run
  LangMem without LangGraph in the environment.
license: MIT
license_tag: "MIT"
open_source: true
use_cases: "LangGraph long-term memory, background memory consolidation, prompt optimization"
activity:
  stars: "1.5k (per GitHub page fetch, 2026-07-05)"
  last_verified_note: >
    fetched live 2026-07-05; 135 commits, 47 open issues, 10 open PRs, 173 forks. "Active repo" and
    "actively-releasing package" are different claims here: latest PyPI release is 0.0.30, dated
    2025-10-27 — 8+ months stale as of this fetch. Of the 42 commits to main since that release, 36
    are Dependabot bumps; the human remainder is docs/CI, not memory-logic work. One maintainer
    accounts for ~47% of human commits (~74% with the #2 contributor) — bus-factor-1.
known_caveats: >
  See harness-eval issue #38 (docs/raw/langmem-pre-screen-2026-07-05/, reports/langmem_prescreen.md,
  reports/langmem_live.md — pre-screen + a real key-free live run). Open, unfixed, near-zero-response
  upstream bugs in LangMem's two headline functions: #140 (create_search_memory_tool doesn't
  retrieve memories written by create_memory_store_manager) and #154 (records not persisting to
  Postgres) — the #140-shaped gap was independently reproduced live in harness-eval's own run. The
  merge/consolidation logic is delegated to `trustcall`, a dependency ~12 months stale with 36 open
  issues. No CVEs in LangMem itself (confirmed via GitHub Advisory API), but it inherits
  langchain-core/langgraph's 2026 CVE wave (LangGrinch CVSS 9.3 among them) via version floors that
  don't exclude the vulnerable range. Two open, unanswered memory-poisoning issues (#163/#164).
  A real live run (key-free, via harness-assembler + harness-eval's benches) found LangMem ties the
  naive baseline on a long-term-memory suite once a scoring artifact is corrected for, and scores
  0.0 on a multi-turn-memory suite because its default consolidation schema returns one broad
  narrative blob with no answer-precision layer — not a benchmark claim LangMem itself makes, but
  a real finding about its default integration pattern.
