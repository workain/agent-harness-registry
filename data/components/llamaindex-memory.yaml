name: LlamaIndex Memory
slug: llamaindex-memory
homepage: https://developers.llamaindex.ai/python/framework/module_guides/deploying/agents/memory/
category: memory
layer: "Memory / data layer (equivalent to Block F) — one module within a larger RAG/document-agent framework"
what_it_is: >
  The memory module of LlamaIndex (a document-agent/RAG/OCR platform — the framework
  itself is broader than equipment, this entry scopes to its memory piece
  specifically). Short-term memory via `ChatMemoryBuffer` (last-N-messages within a
  token budget) or `ChatSummaryMemoryBuffer` (same, plus periodic summarization);
  long-term memory represented as `Memory Block` objects that receive flushed
  short-term messages and optionally process them — three predefined blocks ship:
  `StaticMemoryBlock`, `FactExtractionMemoryBlock`, `VectorMemoryBlock`. An agent calls
  `memory.put()`/`memory.get()`; short-term and long-term memory are merged at
  retrieval time.
integration: "Part of the `llama_index` Python package (`llama-index-core`); use an existing `BaseMemory` subclass or author a custom one"
