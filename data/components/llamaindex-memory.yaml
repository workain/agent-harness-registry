harness_eval_verdict:
  reviewed: "2026-07-06"
  tier: "B"
  testability: "tested-live"
  one_liner: >
    Live-tested the ONE memory component in this catalog whose fact/vector extraction
    pipeline matched a flat-file baseline exactly (task-for-task on bfcl_memory) rather
    than trailing it — but only by bypassing a real default-config footgun that would
    otherwise silently disable the feature entirely, and only after fixing a vector-store
    bug in llama-index-core's own only zero-service backend.
  what_to_steal: >
    The pluggable Memory Block architecture (Static/Fact/Vector, each a small typed ABC)
    is a clean, genuinely reusable design for composing multiple long-term memory
    strategies behind one short-term buffer — and the blocks themselves are portable,
    vendorable Python you could lift independently of the rest of the framework.
  the_catch: >
    Live-tested (harness-eval #46, key-free: local sentence-transformers embeddings + a
    Claude-Code-subscription LLM shim, no paid API key) through persistbench_v1 (12
    tasks), bfcl_memory_v1 (12 tasks), and niah_v1 (short+medium tiers, 6 tasks).
    llamaindex-memory (FactExtractionMemoryBlock + VectorMemoryBlock) matched the
    flat-file file-wiki baseline EXACTLY on all three benches (1.000 vs 1.000 on
    persistbench, 0.750 vs 0.750 on bfcl_memory — task-for-task identical, the same 9/12
    right and the same 3/12 wrong — and 1.000 vs 1.000 on niah) — the first memory
    component in this eval series (after mem0, graphiti-zep, letta,
    openai-conversations-api) to clear that bar rather than trail it by a wide margin.
    But two real bugs had to be found and worked around to get there, both reproduced
    live: (1) `Memory`'s long-term blocks only receive content once the short-term FIFO
    waterfalls past ~21,000 tokens by default — a short conversation would never cross
    that, so the advertised feature would silently never activate; this eval's agents
    bypass the waterfall entirely and drive the blocks directly. (2) `SimpleVectorStore` —
    llama-index-core's own only in-process/zero-service vector store — cannot actually
    back `VectorMemoryBlock` at all: its `query()` never populates `.nodes` (only
    ids+similarities) and its `add()` unconditionally strips node text, so retrieval is
    silently empty regardless of ingested data, on every query; a custom vector store had
    to be written to close this gap. A third finding is relevant beyond this component:
    using `claude -p` (the Claude Code CLI, not a bare LLM API) as a key-free LLM
    stand-in leaked the operator's own ambient session context (their email) into
    extracted "facts" that were never in the processed text — an eval-integrity risk in
    the shim methodology this whole series reuses (mem0/graphiti-zep/llamaindex-memory),
    not specific to llama-index; mitigated with an explicit anti-leakage instruction, not
    silently absorbed. Scope caveat: the match may partly reflect these benches' small
    per-task context size, where thin (exact-string, no-chunking) consolidation and no
    consolidation converge — the harder niah `long` tier and turn-by-turn bfcl ingestion
    were both skipped live for wall-clock reasons on a shared host, so whether the match
    holds at larger scale is untested. Also carries the framework's own 9 GitHub Security
    Advisories (2 SQL-injection, 2 command-injection, 2 arbitrary-code-execution, 1
    prompt-injection-to-RCE CVE) — none reachable through the memory module specifically,
    directly checked.
