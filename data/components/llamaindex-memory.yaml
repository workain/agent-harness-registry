name: LlamaIndex Memory
slug: llamaindex-memory
homepage: https://developers.llamaindex.ai/python/framework/module_guides/deploying/agents/memory/
category: memory
layer: "Memory / data layer (equivalent to Block F) — one module within a larger RAG/document-agent framework"
what_it_is: >
  The memory module of LlamaIndex (a document-agent/RAG/OCR platform — the framework
  itself is broader than equipment, this entry scopes to its memory piece
  specifically). `ChatMemoryBuffer`/`ChatSummaryMemoryBuffer` are DEPRECATED per their
  own source docstrings ("Please use llama_index.core.memory.Memory instead"), though
  `ChatMemoryBuffer` remains the framework's own documented default as of this review.
  The current/recommended entry point is the unified `Memory` class: a short-term FIFO
  chat buffer (SQL-backed) that "waterfalls" evicted messages into pluggable long-term
  `Memory Block` objects — three predefined blocks ship: `StaticMemoryBlock`,
  `FactExtractionMemoryBlock` (LLM-extracted facts, exact-string dedup only),
  `VectorMemoryBlock` (embed-and-store flushed batches, one un-chunked blob per flush).
  An agent calls `memory.put()`/`memory.get()`; short-term and long-term memory merge at
  retrieval time. CAUTION (live-tested, harness-eval #46): `Memory`'s long-term blocks
  only receive content once the short-term FIFO exceeds `token_limit *
  chat_history_token_ratio` (21,000 tokens by default) — a short conversation may never
  cross that threshold, so the long-term blocks silently never populate at all under
  defaults. CAUTION 2: `VectorMemoryBlock` cannot actually retrieve anything when backed
  by `SimpleVectorStore` — llama-index-core's own only in-process/zero-service vector
  store — because `SimpleVectorStore.query()` never populates the `.nodes` field
  `VectorMemoryBlock` reads (only ids+similarities), and its `add()` unconditionally
  strips node text regardless of `stores_text`. A custom `BasePydanticVectorStore` is
  required to use this block key-free at all.
integration: "Part of the `llama_index` Python package (`llama-index-core`, zero hard dependency on the broader indexing/retrieval stack — its only llama-index-* dependency is the lightweight llama-index-workflows package); use an existing `BaseMemory` subclass or author a custom one. `FactExtractionMemoryBlock`/`VectorMemoryBlock` take typed `LLM`/`BaseEmbedding` fields (provider-agnostic), but llama-index-core itself ships ZERO concrete LLM or embedding providers (verified: llama_index.core.llms has only CustomLLM/MockLLM; BaseEmbedding is an ABC only) — every real provider is a separate optional package, and no local/offline default exists for either role. No extras/optional-dependencies split: `pip install llama-index-core` always pulls 27 hard dependencies (SQLAlchemy, NLTK, networkx, tiktoken, pillow, banks, aiosqlite, ...) and an 11.9MB wheel regardless of what you use."
