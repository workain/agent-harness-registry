name: CrewAI Memory
slug: crewai-memory
homepage: https://github.com/crewAIInc/crewAI
category: memory
layer: "Memory / data layer (equivalent to Block F) — one subsystem of a larger multi-agent framework"
what_it_is: >
  The memory subsystem of CrewAI (a multi-agent orchestration framework — the framework
  itself is broader than equipment, this entry scopes to its memory piece specifically).
  As of ~v1.10.x (2026-03), a full rewrite ("Cognitive Memory") replaced the older
  short-term/long-term/entity/ChromaDB/SQLite design with a single `crewai.Memory` class:
  every write runs an LLM-based "EncodingFlow" that infers scope/categories/importance and
  automatically detects and consolidates (updates/deletes) contradicting prior records
  above a similarity threshold; every deep recall runs an LLM-driven "RecallFlow" that
  distills the query, does confidence-based iterative-deepening search, and reports
  explicit "evidence gaps" when confidence stays low. Default storage is on-disk LanceDB
  (Qdrant-edge as a Windows fallback), default embedder is OpenAI `text-embedding-3-large`,
  default LLM is `gpt-5.4-mini` for the analysis calls. Live-tested (harness-eval #49):
  the underlying mechanisms are real and not oversold, but "cognitive layer" is CrewAI's
  own marketing term for a well-engineered LLM-analyzed RAG pipeline, not a categorically
  different architecture.
integration: "The current `Memory` class is standalone-usable — `Memory().remember(...)`/`.recall(...)` work with no Agent/Crew/Task/kickoff() required (docs.crewai.com confirms 'no agents or crews required'); it is also usable as a Crew/Agent capability alongside tools, knowledge, and checkpointing. Not separately installable — `pip install crewai` pulls the whole framework. Outside a Crew's own lifecycle, callers must invoke `drain_writes()`/`close()` themselves to flush the background save thread pool."
