name: Generative Agents Memory Stream (Stanford)
slug: generative-agents-memory-stream
category: memory
homepage: https://github.com/StanfordHCI/genagents
license: MIT
license_tag: MIT
open_source: true
use_cases: "believable agent simulations, importance-weighted long-term recall, self-reflection/higher-level inference, social-behavior research"
what_it_is: >
  The "importance + recency + relevance" memory-stream design that traces back to the 2023
  Stanford/Google "Generative Agents: Interactive Simulacra of Human Behavior" paper
  (arXiv:2304.03442) — one of the most-cited agent-memory designs, and the ancestor of the
  retrieval heuristic several commercial memory products in this registry now use. IMPORTANT
  CITATION CORRECTION: `StanfordHCI/genagents` (this entry's homepage) is NOT the 2023 paper's
  own reference implementation — its own README cites a different, later paper,
  arXiv:2411.10109 ("Generative Agent Simulations of 1,000 People" / "LLM Agents Grounded in
  Self-Reports Enable General-Purpose Simulation of Individuals," 2024). It genuinely reuses
  the 2023 memory-stream architecture (confirmed directly in `memory_stream.py`) as a
  component of that later, different project. The 2023 paper's actual reference repo is the
  separate `joonspk-research/generative_agents` (21.7k★, Apache-2.0) — not linked here
  previously; cite that repo for the original paper's own code. Three parts, confirmed
  in-code: (1) a **Memory Stream** — a timestamped, append-only log of every observation, each
  entry carrying a natural-language description, a creation/last-accessed timestamp, and an
  LLM-assigned importance score; (2) **Retrieval** — a scoring function combining recency
  (exponential decay), importance, and relevance (embedding cosine similarity); (3)
  **Reflection** — a periodic synthesis step generating higher-level inferences from raw
  memories, written back into the stream. `StanfordHCI/genagents` ships a bank of 3,505
  GSS-demographic agents (fictional names/addresses, built from General Social Survey
  responses, NOT interview transcripts) plus a SEPARATE, privacy-restricted bank of
  interview-grounded agents (1,052 real people) of which only 1 sample is shipped publicly —
  correcting a prior "3,000+ agents built from real interview data" framing that conflated the
  two banks. LIVE-TESTED CAVEAT (harness-eval #45): the public `GenerativeAgent` API's
  default retrieval ships with recency weight **0** (`hp=[0,1,0.5]`) and a 120-node top-N
  cutoff that is a no-op full-stream dump on anything under 120 memories — including the
  repo's own shipped demo agent (116 nodes). There is no search/query method on the public API
  at all; getting genuine recency-weighted top-k retrieval requires calling the internal
  `MemoryStream.retrieve()` directly.
integration: >
  Reference Python implementation in the linked repo — a research codebase (13 commits, zero
  commits in ~19.5 months as of 2026-07-05, no test suite, no CI) rather than a maintained,
  installable SDK. Hardcoded to OpenAI (`openai.OpenAI(...)`/module-level
  `openai.embeddings.create`, no `base_url`/provider config anywhere, grep-confirmed) — a
  ~19-month-unmerged community PR adding Anthropic/GPT4All support has never been merged.
  Real, non-trivial per-item call cost: `remember()` = 1 LLM call + 1 embedding call (not
  batched); `reflect()` = 2 LLM calls + up to 6 embedding calls. No `settings.py` ships (must
  hand-copy from `example-settings.py`), no env-var support for the API key. Most production
  memory products in this registry (Mem0, Cognee) use variations of an importance/recency/
  relevance retrieval formula with a similar shape to this one, but no direct dependency on
  this repo was found — a prior "Mem0 especially implements variations of this formula" claim
  is unsupported (Mem0's own arXiv paper, 2504.19413, never cites Park et al. or Generative
  Agents) and has been removed.
