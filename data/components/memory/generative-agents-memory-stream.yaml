harness_eval_verdict:
  reviewed: "2026-07-06"
  tier: "C"
  testability: "tested-live"
  one_liner: >
    A historically important, cleanly-coded memory-stream reference architecture whose public
    API ships crippled (recency weight 0, a 120-node dump disguised as retrieval) — but once you
    bypass that API and call its retrieval internals directly, it produced the strongest
    live-tested result of any memory component in this registry's series so far, edging out a
    flat-file baseline on one small-N bench (given the small N — 12 persistbench tasks — read
    the 11/12-vs-10/12 margin as genuinely competitive with file-wiki, not reliably 8 points
    better).
  what_to_steal: >
    The importance+recency+relevance retrieval formula and the reflection step (periodic
    higher-level synthesis written back into the same retrievable stream) are the real,
    citable contribution — worth reimplementing with a proper top-k/recency-enabled search
    layer on top, which is exactly what this eval's "fixed" configuration did to get its
    strong numbers. Cite `joonspk-research/generative_agents` (21.7k★, Apache-2.0), not this
    repo, when referencing the ORIGINAL 2023 paper's code.
  the_catch: >
    Citation mismatch: this entry's homepage, `StanfordHCI/genagents`, is not the 2023 paper's
    own reference implementation — it is a component of a separate, later (2024) project; the
    true 2023 reference repo is `joonspk-research/generative_agents`. Live-tested
    (harness-eval #45, key-free: a Claude-Code-subscription shim + local sentence-transformers
    embeddings, no paid API key), through persistbench_v1/bfcl_memory_v1/niah_v1 vs. a
    bare-model floor and a file-wiki flat-text baseline, same underlying LLM throughout: using
    ONLY the public `GenerativeAgent.utterance()` API (which ships with recency weight 0 and a
    120-node dump cutoff), genagents scored 0.667 on persistbench — worse than file-wiki's
    0.833. Bypassing the public API to call `MemoryStream.retrieve()` directly with a genuine
    top-5 and non-zero recency weight recovered 0.917 on persistbench (BEATING file-wiki,
    0.833 — a first for any memory component tested in this series; `#35` letta and `#36`
    graphiti-zep both lost to file-wiki on every fully-run bench, often by 25-67 points; given
    the small N here, 12 persistbench tasks, this specific 11/12-vs-10/12 margin should be read
    as genuinely competitive with file-wiki, not reliably 8 points better), 0.667
    on bfcl_memory_v1 (vs. file-wiki 0.75), and 0.833 on niah_v1's short+medium tiers (vs.
    file-wiki 1.0, with the one miss an honest abstention, not a hallucinated code). Real cost
    overhead confirmed: 1.9x-14.6x file-wiki's wall-clock across the three benches, from
    non-batched per-item LLM+embedding calls (`remember()` = 1 LLM + 1 embedding call each).
    3 of genagents' 4 bfcl_memory misses were flagged by that suite's own anti-reward-hacking
    gate for narrative answers bleeding in off-target distractor content — a smaller-scale
    echo of letta's same failure mode. Separately (source-level, not live-tested): the project
    is a ~19.5-month-stale academic release (13 commits, no test suite, no CI), hardcoded to
    OpenAI with a ~19-month-unmerged community PR for alternate providers, and its shipped
    "3,000+ interview-based agents" framing conflates a 3,505-agent fictional-identity
    GSS-demographic bank with a separate, privacy-restricted, mostly-unpublished
    interview-grounded bank (1 public sample, carrying a real named individual's real
    political/religious/immigration-status details).
  raw_evidence: https://github.com/workain/harness-eval/tree/main/reports/genagents_live
