harness_eval_verdict:
  reviewed: "2026-07-05"
  tier: "C"
  testability: "tested-live"
  one_liner: >
    A genuinely distinctive temporal knowledge-graph design, undermined by a real API
    footgun (the documented search call misses most single-fact memories) that, even after
    a manual fix, still trails a flat-file baseline on a live head-to-head. Tested at small
    scale (corpus fits in context); large-corpus/long-horizon performance untested
    (harness-eval#53, operator directive 2026-07-06).
  what_to_steal: >
    The temporal-validity-window model (facts have explicit valid_at/invalid_at, superseded
    facts are kept not deleted, full provenance back to the source episode) is a genuinely
    good idea worth reimplementing regardless of this component's own retrieval gaps.
  the_catch: >
    Live-tested (harness-eval #36, key-free: Kuzu + local embeddings + a Claude-Code shim,
    no paid API key): on persistbench_v1 (12 tasks), graphiti-zep using ONLY the documented
    `Graphiti.search()` API scored 0.167 accuracy — statistically identical to a bare model
    with NO memory at all (also 0.167) — because that API only returns entity-relationship
    edges, and most persistbench-style facts are single-entity attributes with no edge to
    return. A diagnostic confirmed the underlying data WAS extracted correctly (an accurate
    entity summary existed) but was invisible to the documented search path. Manually adding
    the lower-level node-search call recovered most of the gap (0.667) but still trailed the
    flat-file `file-wiki` baseline (0.917) on the same bench with the same underlying LLM.
    The SAME pattern reproduced on two more, differently-shaped benches after the fix: on
    bfcl_memory_v1 (12 real BFCL v4 tasks), graphiti-zep scored 0.25 vs. file-wiki's 0.75;
    on niah_v1's short tier (3 tasks), 0.333 vs. file-wiki's 1.0. In every case graphiti-zep
    beats a zero-memory floor but trails the trivial flat-file baseline by 25-67 points —
    the extra extract-into-a-graph-then-search machinery loses information relative to just
    handing the LLM the raw text, on every bench tested. Additionally: 3 more real
    graphiti-core 0.29.2 bugs were hit and worked around live (not
    cited secondhand) — `Graphiti.__init__` hardcodes an `OPENAI_API_KEY`-requiring
    cross-encoder even with a fully custom llm/embedder/driver supplied; `KuzuDriver` crashes
    on any non-`None` `group_id` (`AttributeError: no attribute '_database'`); and
    `Graphiti.build_indices_and_constraints()` is a dead no-op on Kuzu, so the first hybrid
    search after ingest fails outright unless you call the driver's internal graph_ops method
    directly. Separately (source-level, not live-tested): "beats mem0 on LoCoMo" is a
    contested, 3-round vendor dispute (84% / 58.44% / 75.14%, no neutral reproduction), Kuzu
    (the only backend needing no separate service) is itself deprecated upstream, and a
    documented, still-open community complaint reports 30-50 minutes to ingest a single
    ~5KB episode in the worst case (not reproduced at that severity here — Claude-backed
    extraction took 20-55s/episode — but the complaint pattern itself was independently
    confirmed to exist). CVE-2026-32247 (Cypher injection via LLM-supplied entity_types,
    CVSS 8.1) is patched in >=0.28.2 — pin above that floor. SCALE CAVEAT (operator
    directive, harness-eval#53, 2026-07-06): persistbench_v1's session1 corpus (~170
    characters/task) fits entirely in the model's context window, so this comparison
    cannot show whether graphiti-zep's graph-then-search approach would fare differently
    once the corpus exceeds what fits in context. Tested at small scale only;
    large-corpus/long-horizon performance is untested and not claimed here.
  raw_evidence: https://github.com/workain/harness-eval/tree/main/reports/graphiti_zep_live
