name: Graphiti (open-source engine behind Zep)
slug: graphiti-zep
homepage: https://github.com/getzep/graphiti
category: memory
layer: "Memory / data layer (equivalent to Block F) — temporal knowledge-graph shape"
what_it_is: >
  An open-source framework for building TEMPORAL context/knowledge graphs for AI agents:
  entities, relationships, and facts carry validity windows, so the graph captures not
  just current truths but historical states with full provenance back to source
  "episodes." Hybrid retrieval combines semantic embeddings, keyword search, and graph
  traversal; updates are incremental (no full recomputation). Graphiti is the
  open-source engine at the core of Zep, a commercial platform that layers user
  management, conversation storage, pre-optimized retrieval, and managed hosting on top
  — Zep deprecated its self-hosted Community Edition on 2025-04-02 (confirmed directly
  from Zep's own blog post, "Announcing a New Direction for Zep's Open Source Strategy"),
  so self-hosting today means running Graphiti directly against a supported graph backend
  (Neo4j, FalkorDB, Kuzu, or Amazon Neptune). CAUTION (live-tested, harness-eval #36): the
  documented top-level `Graphiti.search()` API returns ONLY entity-relationship edges — for
  single-entity attribute/preference facts (a very common memory shape: "I have a peanut
  allergy", "my deploy window is Tuesdays 14:00 UTC") no edge is created, so `search()`
  silently returns nothing even though the entity node and its summary ARE extracted
  correctly. A lower-level, undocumented-at-quickstart node-search call recovers it.
integration: "Python library; requires a graph database backend (Neo4j/FalkorDB/Kuzu/Neptune) to self-host, since the old all-in-one Community Edition is gone. LLM extraction supports OpenAI/Azure/Anthropic/Gemini/Groq plus any OpenAI-compatible endpoint; embeddings support OpenAI/Azure/Gemini/Voyage (no local embedder shipped — bring your own EmbedderClient for a key-free setup)."
license: Apache-2.0
