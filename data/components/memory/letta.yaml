name: Letta (formerly MemGPT)
slug: letta
homepage: https://github.com/letta-ai/letta
category: memory
layer: "Memory / data layer (equivalent to Block F), with its own agent-hosting server"
what_it_is: >
  A platform for "stateful agents" with self-editing, persistent memory — originated as
  MemGPT (UC Berkeley Sky Computing Lab), renamed to distinguish the MemGPT AGENT DESIGN
  from the Letta API server/runtime that hosts agents as a service. Agents can read AND
  write their own internal memory blocks across turns (core/archival/recall memory,
  confirmed against the original MemGPT paper and current secondary sources — this is a
  genuine architecture, not marketing gloss), supporting continuous learning/adaptation
  rather than treating each interaction as isolated context. DEPRECATED (harness-eval
  #35, confirmed from the repo's own `AGENTS.md`, merged 2026-07-03): this exact
  repository is now the vendor-labeled "legacy Letta server," in maintenance mode, with
  active development moved to `letta-ai/letta-code` and the Letta Agent SDK. This entry
  catalogs the artifact the vendor itself now calls superseded.
integration: "CLI for local terminal use; TypeScript/Python SDKs to embed agents in an application; a self-hosted App Server for custom deployments (a LocalClient in-process mode also exists — no Docker/Postgres required for a minimal single-process run, though the packaged server defaults to Postgres). Note: this entry catalogs Letta as MEMORY EQUIPMENT (its self-editing memory-block architecture); its App Server/agent-hosting role overlaps with the engines category — see the note in unverified."
license: Apache-2.0
license_tag: "Apache-2.0"
open_source: true
use_cases: "self-editing agent memory, stateful agent hosting"
