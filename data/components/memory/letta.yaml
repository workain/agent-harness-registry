harness_eval_verdict:
  reviewed: "2026-07-05"
  tier: "D"
  testability: "tested-live"
  one_liner: >
    A historically important, mechanically real self-editing-memory design — confirmed
    working end-to-end in a live key-free test (at v0.6.7; see the version-scope
    disclosure in the_catch) — shipped in a repository its own vendor declared deprecated
    legacy two days before this eval, and one that, at the tested version, loses to both a
    bare model and a trivial flat-file baseline on every fully-tested bench, sometimes
    dramatically. Tested at small scale (corpus fits in context); large-corpus/long-horizon
    performance untested (harness-eval#53, operator directive 2026-07-06).
  what_to_steal: >
    The agent-edits-its-own-memory-via-tool-calls architecture (core memory blocks the
    agent can append/replace directly, distinct from Mem0/Cognee's extraction-pipeline
    model) is a real, citable design predating most of this registry's other memory
    entries and worth studying independent of this specific implementation's live results
    — it is architecturally closer to Anthropic's own memory tool than to the
    vector-extraction-pipeline school.
  the_catch: >
    Version-scope disclosure (fairness — read first): the LIVE test ran on
    **letta==0.6.7 (released 2024-12-31)**, ~18 months and ~119 releases behind the
    current catalogued **v0.16.8**. The pin is a genuine Python-3.14 compatibility wall,
    not a shortcut — pip's own resolver stops at 0.6.7 on a 3.14 interpreter (reproduced).
    So the two findings below are DISTINCT and must not be conflated: (1) the deprecation
    is about the CURRENT repo; (2) the performance numbers characterize the TESTED 0.6.7
    artifact, not necessarily what v0.16.8 would score. We did not test v0.16.8. With that
    scope stated:
    Two independent problems stack here, either one alone would be a serious caveat.
    (1) Vendor-confirmed deprecation: `letta-ai/letta`'s own `AGENTS.md` (merged
    2026-07-03, two days before this eval) states in the vendor's own words that this
    repository is "deprecated... legacy... in maintenance mode... no longer where active
    development happens," redirecting to `letta-ai/letta-code` and the Letta Agent SDK.
    (2) Live-tested (harness-eval #35, key-free: a tool-calling-capable Claude-Code-shim
    plus local sentence-transformers embeddings, no paid API key — the first assembler
    memory component needing a tool-calling shim rather than a text-only one, since
    Letta's entire agent loop runs on function calls) across all three of harness-eval's
    memory benches, letta consistently underperforms BOTH an honest bare-model floor and
    a flat-file (file-wiki) baseline, and is substantially slower everywhere:
    persistbench_v1 (FULL 12/12) — bare 1.000 (94s), file-wiki 0.833 (159s), letta 0.750
    (496s); bfcl_memory_v1 (FULL 12/12) — bare 0.750 (53s), file-wiki 0.750 (458s), letta
    0.333 (1627s, ~27min); niah_v1 (sampled 3/9, short-context tier only, disclosed) —
    bare 1.000 (13s), file-wiki 1.000 (11s), letta 0.000 (67s). Three distinct real
    failure modes were traced through raw transcripts, not guessed: on persistbench,
    letta capitulates to hedged/unsupported pushback more readily than either baseline;
    on bfcl_memory, every one of its 8 failures is flagged by the suite's own
    anti-reward-hacking gate for producing long, narrative replies that bury the correct
    answer in embellishment (a style/discipline problem, not fabrication); on niah, the
    agent's own captured reasoning shows it explicitly NOTICING the planted fact at
    ingest time but never committing it to archival memory, engaging conversationally
    with the surrounding text instead. Separately, a real engineering reliability risk:
    Letta's agent loop can ignore instructions to stop chaining tool calls, producing
    slow or non-terminating turns (one test during component development took 59
    round-trips over ~100s before self-correcting); a safety-net fix and a hard per-turn
    timeout were both required to run this eval safely, and are a load-bearing
    requirement for anyone adopting this component, not an optional nicety. On the
    positive side, live testing DID confirm the core architectural claim is real and not
    oversold: genuine `core_memory_replace`/`archival_memory_insert` tool calls execute,
    and memory genuinely persists across process boundaries (verified via a fresh-client
    recall test) — the capability exists and works mechanically, it simply does not win
    against much simpler baselines on the tasks tested. Also unpatched-status-ambiguous:
    a critical MCP STDIO command-injection RCE class was reported as "already patched on
    [Letta's] official website" with no confirmation the self-hosted OSS path received
    the same fix; CVE-2026-4965 (code-injection, public exploit indicators) and
    CVE-2024-39025 (pre-rename MemGPT missing-authorization) both apply to versions in
    this package's lineage. SCALE CAVEAT (operator directive, harness-eval#53,
    2026-07-06): persistbench_v1's session1 corpus (~170 characters/task) fits entirely
    in the model's context window, so this comparison cannot show whether letta's
    self-editing memory-block design would fare differently once the corpus exceeds what
    fits in context. Tested at small scale only; large-corpus/long-horizon performance is
    untested and not claimed here.
  raw_evidence: https://github.com/workain/harness-eval/tree/main/reports/letta
