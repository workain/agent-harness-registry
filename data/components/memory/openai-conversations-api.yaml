harness_eval_verdict:
  reviewed: "2026-07-05"
  tier: "C"
  testability: "untestable-here (needs OpenAI account) — architectural, not just no-key"
  one_liner: >
    A real, working durable-conversation-state primitive with no independent memory
    algorithm to evaluate — it is a thin proprietary wrapper around OpenAI's
    server-side storage, carrying a documented vendor-churn pattern (3rd
    stateful-conversation product in ~2 years, predecessor force-retired on a hard
    date) and a stricter-than-expected data-retention posture.
  what_to_steal: >
    The TTL-exemption design (durable objects opt out of the default 30-day
    ephemeral-response window, rather than requiring the caller to re-POST full
    history every turn) is a clean API shape worth copying for any hosted
    conversation-state feature, independent of who implements it.
  the_catch: >
    Live-testability was genuinely investigated, not assumed from the issue's own
    "likely untestable" framing: reading openai-python 2.44.0's
    `resources/conversations/conversations.py` and openai-agents 0.17.7's
    `agents/memory/openai_conversations_session.py` directly confirms
    `OpenAIConversationsSession.get_items`/`add_items`/`pop_item`/`clear_session` are
    pure passthroughs to `self._openai_client.conversations.*` REST calls — zero
    client-side retrieval/consolidation/ranking logic exists to substitute a local
    LLM shim into (contrast: the SDK's own `SQLiteSession`/`RedisSession`/etc. DO
    contain real local logic and would be legitimately testable, but are a different
    component). No `OPENAI_API_KEY` is available in this sandbox either. Source-level
    findings (not live-scored) that an adopter should weigh: (1) this is OpenAI's
    THIRD stateful-conversation product in ~2 years — the Assistants API's Threads
    (the second) are hard-sunset 2026-08-26 with "no automated tool for migrating
    Threads to Conversations" per OpenAI's own migration guide, and a developer in
    OpenAI's community asked point-blank whether Conversations will suffer the same
    fate; (2) `conversation=`/`previous_response_id` do NOT reduce token billing — all
    accumulated history is billed as input tokens every single turn regardless of
    who stores it (the community calls this "quadratic billing"); (3) conversation
    objects/items are explicitly ineligible for Zero Data Retention and retained
    "until deleted" (stricter than a general 30-day-abuse-window reading), and
    deleting a conversation does not cascade to delete its items (a real
    right-to-be-forgotten trap, compounded by legal holds that can override deletion
    entirely); (4) confirmed production bugs in both the raw API (500s listing items
    with tool-calls, 400s on image items) and the exact SDK wrapper this component
    names (`openai-agents-python` issues #1709, #1539, #2727 — reasoning-model
    replay failures and broken compaction); (5) no published item/conversation-count
    ceiling or bulk-export path was found, an unbounded-growth-with-no-visibility
    risk; (6) hard vendor/model lock-in — Responses-API-only, no cross-vendor read or
    export path — plus only partial, price-tagged data residency (a ~10% uplift for
    eligible models, with inference still US-based); (7) naming-collision risk: Azure
    OpenAI / Microsoft Foundry ships its OWN, separately-implemented "Conversations"
    resource under a different access model (`AIProjectClient`) — that is NOT the
    platform API evaluated here, and future audits must disambiguate the two.
    What would close the testability gap: a sandbox with a funded/free-tier
    OpenAI API key, running the standard bare/file-wiki/candidate 3-way bench
    (persistbench/bfcl_memory/niah) through real `responses.create()` calls.
  raw_evidence: https://github.com/workain/harness-eval/tree/main/docs/raw/memory-components/openai-conversations-api-2026-07-05
