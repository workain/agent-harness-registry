name: OpenAI Conversations API
slug: openai-conversations-api
homepage: https://developers.openai.com/api/docs/guides/conversation-state
category: memory
layer: "Memory / data layer (equivalent to Block F) — the vendor-provided PATTERN, not a standalone product"
what_it_is: >
  A stateful conversation-persistence system that pairs with OpenAI's Responses API:
  create a conversation object once (a durable identifier), then pass its ID into
  subsequent Responses calls instead of manually re-chaining message history. Unlike
  bare response objects (which expire after 30 days), conversation objects and their
  items are NOT subject to that TTL — suitable for applications where users return
  across sessions/devices over long periods. Distinct from the separate,
  consumer-facing ChatGPT "memory" feature (ChatGPT's own ability to remember facts
  across chats) — the fetched docs make no connection between the two, treat them as
  separate implementations. The OpenAI Agents SDK also provides a generic `Session`
  abstraction (invoked via `Runner.run(agent, input, session=session)`, not a method
  on the session object itself); one concrete implementation,
  `OpenAIConversationsSession`, wraps this Conversations API specifically, while
  other built-in sessions (SQLite, Redis, SQLAlchemy, MongoDB, Dapr, etc.) are
  independent local/self-hosted backends behind the same interface. CAUTION
  (source-pre-screen, harness-eval #43): this is OpenAI's third stateful-conversation
  product in ~2 years — the Assistants API's Threads are being force-retired on
  2026-08-26 with no automated migration tool, and a developer in OpenAI's own
  community asked directly whether Conversations will get the same treatment. Using
  `conversation=`/`previous_response_id` does NOT reduce token billing — OpenAI's own
  docs confirm all accumulated history is billed as input tokens every turn
  ("quadratic billing"). Conversation objects/items are explicitly ineligible for
  Zero Data Retention and are retained "until deleted" (stricter than the general
  30-day abuse-monitoring framing); deleting a conversation does not delete its
  items.
integration: "REST API call: create a conversation, then pass `conversation=\"conv_...\"` on subsequent `responses.create(...)` calls; the Agents SDK's `OpenAIConversationsSession` (one of several interchangeable Session backends) wraps this for a more ergonomic loop"
license: "Proprietary OpenAI API feature — not open-source software; this entry catalogs a PATTERN (durable, TTL-exempt conversation state as a first-class API object) available through OpenAI's commercial platform, not a redistributable artifact"
license_tag: "Proprietary API (usable)"
open_source: false
use_cases: "durable multi-session conversation state for OpenAI Responses API agents"
