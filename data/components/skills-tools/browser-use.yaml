name: browser-use
slug: browser-use
category: skills-tools
homepage: https://github.com/browser-use/browser-use
layer: "Capability / tools layer (equivalent to Block B) — browser automation as a tool"
what_it_is: >
  A Python library giving an AI agent direct, reliable control of a web browser (form-filling,
  navigation, research, shopping/checkout-style flows) — one of the highest-adoption single-tool
  components in this registry by star count (103k, more than Mem0's 60.1k, though fewer than
  Anthropic Agent Skills' 158k or the mcp-servers reference repo's 88.1k). Ships as a plain Python
  library AND, notably, as an Agent-Skills-compatible integration (Claude Code/Codex-installable),
  making it simultaneously a standalone tool and an example of the Agent Skills format being used
  to package a THIRD-PARTY tool, not just first-party vendor content — direct evidence for this
  registry's `anthropic-skills` deep-dive's claim that the format's reach extends well past
  Anthropic's own document-creation skills. Also offers a paid cloud API (stealth browsing,
  CAPTCHA solving) for teams that don't want to run browser infrastructure themselves.
integration: "`pip install browser-use`; async/await Python API; extensible via custom-tool decorators; also distributed as an installable Agent Skill for Claude Code/Codex"
