layer: "Capability / tools layer (equivalent to Block B) — sandboxed code-execution as a tool"
what_it_is: >
  Open-source infrastructure for running AI-generated code inside isolated, cloud-based sandboxes
  (Firecracker microVMs) — the code-execution tool component this registry's benchmark/eval-
  framework entries (e.g. Inspect AI) assume exists but don't themselves ship. Distinct from this
  registry's other tools/access entries: MCP/Composio/Zapier MCP connect an agent to EXTERNAL
  services, while E2B gives an agent a safe place to RUN untrusted, agent-generated code
  directly. Ships a dedicated Code Interpreter SDK on top of the base sandbox, plus an E2B
  Desktop variant (a full graphical environment for computer-use-style agents).
integration: "Python/JS/TS SDKs (`pip install e2b` / `npm install e2b`); Code Interpreter SDK for the narrower code-execution-only use case"
