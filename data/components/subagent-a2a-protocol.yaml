what_it_is: >
  A Google-originated, now Linux-Foundation-governed cross-vendor protocol: HTTP/JSON/SSE-based schema for capability discovery, task delegation, and lifecycle management BETWEEN agents built on DIFFERENT frameworks/vendors. The repo's own README states plainly: "The A2A Protocol is an open source project under the Linux Foundation, contributed by Google" — independently re-confirmed by direct fetch. A "launched June 2025, 100+ company backing" claim from the initial research pass could NOT be corroborated on that re-fetch and is flagged below rather than restated as fact.
