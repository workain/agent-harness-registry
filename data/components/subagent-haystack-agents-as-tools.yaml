what_it_is: >
  A distinct compositional pattern: wrap a specialized Agent using `ComponentTool` so it becomes a callable TOOL for a coordinator agent — tools-not-handoffs as the multi-agent primitive. Haystack is a full pipeline framework with its own execution runtime (a `Pipeline.run()` call drives the whole flow) — the framework itself is broader than equipment, and that runtime is engine territory per this registry's harness=equipment-vs-engine split. Haystack is NOT catalogued in this registry's `engines/` category; treat this entry as documenting a compositional pattern (agents-as-tools) worth knowing about, not a recommendation to adopt the whole framework as equipment.
