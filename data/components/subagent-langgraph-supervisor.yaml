what_it_is: >
  The canonical hub-and-spoke "supervisor" role pattern for LangGraph — a supervisor LLM node reads full history and routes to specialist nodes. This pattern runs inside LangGraph's own graph-execution runtime — LangGraph itself is a full framework broader than equipment, and that runtime is engine territory per this registry's harness=equipment-vs-engine split. LangGraph is NOT catalogued in this registry's `engines/` category; treat this entry as documenting a supervisor-routing pattern worth knowing about, not a recommendation to adopt the whole framework as equipment.
