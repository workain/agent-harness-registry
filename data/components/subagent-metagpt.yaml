what_it_is: >
  Five fixed, SOP-bound roles (product manager, architect, project manager, engineer, QA) simulating a software company, communicating via a shared global message pool — "Code = SOP(Team)" philosophy. MetaGPT is a full multi-agent framework with its own execution runtime (a shared global message pool agents run against) — the framework itself is broader than equipment, and that runtime is engine territory per this registry's harness=equipment-vs-engine split, the same narrowing this registry applies to `autogen`. MetaGPT is NOT catalogued in this registry's `engines/` category; treat this entry as documenting a role/SOP-design pattern worth knowing about, not a recommendation to adopt the whole framework as equipment.
