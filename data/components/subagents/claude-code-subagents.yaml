what_it_is: >
  A first-party Claude Code mechanism for delegating a task to a specialized assistant
  that runs in its OWN context window, with its own system prompt, tool access, and
  permissions — the delegating conversation only receives the subagent's final summary,
  not its intermediate search results/logs/file contents, which keeps the main
  conversation's context clean. Delegation can be automatic (Claude matches a task
  against a subagent's own `description` field, which functions as the trigger, not mere
  documentation) or explicit (named). Multiple subagents can run concurrently (e.g.
  style-checker + security-scanner + test-coverage in parallel during a review).
  Subagents are plain Markdown files with YAML frontmatter (name/description/tools/
  model) plus a system-prompt body — project-level ones live under `.claude/agents/`
  and are checked into version control for team sharing.
integration: "Author a Markdown file under `.claude/agents/` with YAML frontmatter (name, description, tools, model) + a system-prompt body; Claude Code auto-discovers and either auto-delegates or accepts explicit by-name invocation"
