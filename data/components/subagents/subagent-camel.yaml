what_it_is: >
  A two-agent role-playing primitive (`role_playing.py`) that spawned a broader "Finding the Scaling Law of Agents" framework and the `camel-ai/owl` (Optimized Workforce Learning) follow-on project. CAMEL is a full research framework with its own execution runtime (the `role_playing.py` loop and the broader scaling-law/OWL infrastructure it spawned) — the framework itself is broader than equipment, and that runtime is engine territory per this registry's harness=equipment-vs-engine split. CAMEL is NOT catalogued in this registry's `engines/` category; treat this entry as documenting a role-playing primitive worth knowing about, not a recommendation to adopt the whole framework as equipment.
