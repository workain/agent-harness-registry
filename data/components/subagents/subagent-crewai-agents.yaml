what_it_is: >
  The role/task-composition layer of CrewAI (distinct from this registry's existing `crewai-memory` entry, which scopes to memory specifically) — the Agent/Crew/Task API for defining who does what. CrewAI is a full orchestration framework with its own execution runtime (a Crew's `kickoff()` call drives the whole multi-agent loop itself) — the framework itself is broader than equipment, and that runtime is engine territory per this registry's harness=equipment-vs-engine split, the same narrowing this registry already applies to the companion `crewai-memory` entry for CrewAI's memory subsystem. CrewAI is NOT catalogued in this registry's `engines/` category; treat this entry as documenting a role/task-composition API worth knowing about, not a recommendation to adopt the whole framework as equipment.
