what_it_is: >
  Event-driven, async-first, step-based multi-agent workflow control for the LlamaIndex ecosystem — complements this registry's `llamaindex-memory` entry (memory-scoped); this one is orchestration-scoped. llama-agents is itself an execution runtime (an event-driven, async, step-based workflow engine), not just a set of role definitions — that runtime is engine territory per this registry's harness=equipment-vs-engine split, the same narrowing this registry already applies to the companion `llamaindex-memory` entry for LlamaIndex's memory subsystem. It is NOT catalogued in this registry's `engines/` category; treat this entry as documenting an orchestration pattern worth knowing about, not a recommendation to adopt the whole runtime as equipment.
