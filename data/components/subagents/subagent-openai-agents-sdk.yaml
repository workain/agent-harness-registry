what_it_is: >
  Swarm's production successor: handoffs, guardrails as first-class objects, OTLP-exportable tracing, provider-agnostic (100+ LLMs via Responses/Chat Completions compatibility). The OpenAI Agents SDK is a full production framework with its own execution runtime (a `Runner.run()` call drives the whole handoff/guardrail loop) — the framework itself is broader than equipment, and that runtime is engine territory per this registry's harness=equipment-vs-engine split. It is NOT catalogued in this registry's `engines/` category; treat this entry as documenting a handoff/guardrail design pattern worth knowing about, not a recommendation to adopt the whole framework as equipment.
