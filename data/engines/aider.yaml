name: Aider
slug: aider
homepage: https://github.com/Aider-AI/aider
interface: "CLI"
what_it_is: >
  Terminal-based AI pair-programming tool: builds a "repo map" of the whole codebase to
  give the model context-aware structure, applies edits as git commits with generated
  messages, and supports 100+ languages. Works with most major model providers, including
  local models. An ENGINE in our taxonomy (drives the model turn-by-turn), not equipment.
license: Apache-2.0
open_source: true
sandboxing: "n/a — no built-in sandbox; runs with the invoking user's own filesystem/git permissions directly, same caveat as the other CLI-style engines here"
