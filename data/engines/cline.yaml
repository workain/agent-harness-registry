name: Cline
slug: cline
homepage: https://github.com/cline/cline
interface: "VS Code extension, JetBrains plugin, CLI, SDK"
what_it_is: >
  Autonomous coding agent available as a VS Code/JetBrains extension, a terminal CLI, or
  a programmatic SDK. Edits files, runs shell commands, and drives a headless browser,
  with every action gated on human approval by default; supports MCP tools and multiple
  model providers (Claude, GPT, Gemini, Ollama, etc.). An ENGINE in our taxonomy — notable
  as one of the few engines with a built-in, default-on human-approval gate per action
  rather than that being purely a harness-level add-on.
license: Apache-2.0
open_source: true
sandboxing: "no process/container sandbox by default — its safety story is per-action human approval rather than filesystem/process isolation; MCP server access is user-configured"
