homepage: https://cursor.com
interface: "Desktop IDE (VS Code fork), CLI, Agents Window (Cursor 3.0)"
what_it_is: >
  An AI-native code editor — a VS Code fork rebuilt so AI is a first-class part of the
  editor rather than a plugin. Ships Composer (a proprietary mixture-of-experts coding
  model), an Agent Mode that reads the codebase/edits files/runs terminal commands in a
  loop, Background Agents (sandboxed cloud execution, hands back a PR), and a browser
  tool for testing web apps directly inside the editor. No public source repository —
  proprietary, closed-source product.
license: "Proprietary — no public source repository found; closed-source commercial product"
open_source: false
sandboxing: "Background Agents run in a sandboxed cloud environment Cursor provisions; local Agent Mode runs with the invoking user's own filesystem/process permissions, gated by an approval/guardrail loop"
