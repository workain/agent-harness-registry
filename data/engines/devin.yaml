name: Devin
slug: devin
homepage: https://devin.ai
interface: "Web app, Slack integration, Linear integration, API, Devin Desktop (IDE + agent dashboard)"
what_it_is: >
  Cognition's autonomous AI software engineer: a tool-using agent with a persistent
  workspace (terminal, code editor, browser) plus planning/reflection loops supporting
  long-running tasks. Sessions can be started from Slack (tag Devin in a thread), Linear
  (assign a ticket), the web app, or the API. Devin Desktop (a later release) combines an
  IDE with a dashboard for coordinating agents across projects/codebases/environments.
  No public source repository — proprietary, closed-source product.
license: "Proprietary — no public source repository found; closed-source commercial product"
open_source: false
sandboxing: "Runs in a persistent, Cognition-managed workspace per session — not self-hosted or user-controlled infrastructure"
