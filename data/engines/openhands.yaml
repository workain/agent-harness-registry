name: OpenHands
slug: openhands
homepage: https://github.com/OpenHands/OpenHands
interface: "self-hosted platform (local / Docker / cloud); orchestrates its own agent or third-party agents"
what_it_is: >
  An open, self-hosted "developer control center" / agent orchestration platform
  (formerly OpenDevin) that can run its own open-source agent or third-party agents
  (Claude Code, Codex, Gemini, etc.) via the Agent-Client Protocol (ACP), across local,
  Docker-sandboxed, or remote/cloud backends — itself a consumer of equipment (e.g. it
  can be pointed at MCP tool servers or a memory layer). Regularly benchmarked on
  SWE-bench Verified and GAIA; launched its own broader "OpenHands Index" (issue
  resolution, greenfield app dev, frontend tasks, testing) in January 2026 [unverified
  — index details not independently fetched, from search-summary only].
license: "MIT for the repo overall, with a carve-out: the LICENSE file opens with a portions-notice (\"Portions of this software are licensed as follows: * All content that resides under the enterprise/ directory is licensed under the license defined in enterprise/LICENSE; * Content outside of the above ... is available under the MIT license as defined below\"), THEN the MIT text itself — confirmed by fetching the actual file, not a badge"
open_source: true
sandboxing: "local execution (full filesystem access, explicitly warned against), Docker sandbox (isolates to a mounted PROJECTS_PATH), or remote backends (VMs/cloud/OpenHands Cloud+Enterprise)"
