what_it_is: >
  An AI-native IDE (formerly Codeium) built around the Cascade agent — multi-file
  understanding via a proprietary "Fast Context" indexing system, terminal command
  execution, and cross-session project memory. Acquired by Cognition (maker of Devin)
  in December 2025 for ~$250M; Windsurf 2.0 (April 2026) embedded Devin's autonomous
  agent directly into the IDE, letting a user plan locally with Cascade then hand off
  to a cloud VM. No public source repository — proprietary, closed-source product.
