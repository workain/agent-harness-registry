name: rmr-rnd/harness-bench
slug: harness-bench
homepage: https://github.com/rmr-rnd/harness-bench
type: harness
what_it_is: >
  A plugin-based multi-benchmark harness shipping three benchmark ports: bfcl_memory (real
  Berkeley BFCL v4 data, exact-match scoring), persistbench (30 JSON tasks, 3 task types,
  entirely LLM-judge scored via regex-extracted JSON), and niah (40 of 225 grid cells of a
  needle-in-a-haystack port, LLM-judge on a 1/3/5/7/10 rubric scale). Auto-discovery via a
  register_benchmark() decorator + pkgutil-based package walk.
capabilities:
  contamination_gate: "none found (grepped for contamination/leakage/canary/etc. — zero real hits; the few matches were incidental substrings in task content)"
  reward_hacking_detection: "none found (same grep — zero hits for reward-hack/tamper/adversarial/canary/allowlist/denylist)"
  reliability_methodology: "epochs=3 is SET for 2 of 3 task types but never consumed for variance/reliability aggregation anywhere in the codebase — a defined-but-unused field, confirmed by direct grep, not assumed"
  sandboxing: "uses Docker, but for RUNNING agent actions in some task environments — not for eval-integrity/anti-tamper purposes"
