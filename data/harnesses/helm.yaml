name: HELM (Holistic Evaluation of Language Models)
slug: helm
homepage: https://github.com/stanford-crfm/helm
type: harness+benchmark
what_it_is: >
  Stanford CRFM's broad language-model benchmark suite — dozens of `Scenario` classes
  covering a wide range of tasks, run through a common runner/metrics pipeline. Ships its
  own robustness metric: worst-case accuracy over systematic input perturbations
  (typos, contrast sets, dialect shifts).
capabilities:
  contamination_gate: "acknowledged as a limitation (evidence pushed to a paper appendix), not mechanically gated at eval time"
  reward_hacking_detection: "none in the scoring-exploit sense; the input-perturbation robustness metric is a different axis (robustness to input variation, not resistance to a candidate gaming the SCORER)"
  reliability_methodology: "not found in fetched text — no confidence-interval/repeated-run variance mechanism located [unverified — could exist deeper in unfetched appendices]"
  sandboxing: "n/a — LM benchmark suite, not agentic code execution"
