what_it_is: >
  An open, self-hosted "developer control center" / agent orchestration platform
  (formerly OpenDevin) that can run its own open-source agent or third-party agents
  (Claude Code, Codex, Gemini, etc.) via the Agent-Client Protocol (ACP), across local,
  Docker-sandboxed, or remote/cloud backends. Regularly benchmarked on SWE-bench Verified
  and GAIA; launched its own broader "OpenHands Index" (issue resolution, greenfield app
  dev, frontend tasks, testing) in January 2026 [unverified — index details not
  independently fetched, from search-summary only].
