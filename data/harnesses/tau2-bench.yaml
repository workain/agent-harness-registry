name: tau-bench / tau2-bench (τ²-bench)
slug: tau2-bench
homepage: https://github.com/sierra-research/tau2-bench
type: harness+benchmark
what_it_is: >
  Sierra Research's simulation framework for evaluating tool-using dialogue agents
  against a simulated user (itself an LM) in real-world business domains: mock, airline,
  retail, telecom, and banking_knowledge (knowledge-retrieval-based). Original tau-bench
  (arXiv:2406.12045) was text-only; τ²-bench/1.0.0 added multimodal, knowledge-aware,
  and voice (full-duplex, real-time audio) evaluation.
